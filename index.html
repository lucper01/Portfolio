<html lang="fr">
<head>
  <meta charset="UTF-8" />

  <link rel="apple-touch-icon" href="assets/favicon.png" />

  <meta id="twitter-description" name="twitter:description" content="Portfolio académique de Luc Perroquin, doctorant en psychologie cognitive, consacré à l'intégration entre olfaction, vision et audition." />
  <meta name="twitter:image" content="https://lucper01.github.io/Portfolio/assets/photo-profil.png" />

  <title>Luc Perroquin | Portfolio académique</title>

  <style>
    :root {
      --page-width: 1320px;
      --green-deep: #061f17;
      --green-dark: #0b2f23;
      --green-main: #1f6f50;
      --green-light: #77b892;
      --green-soft: #dceee3;
      --green-pale: #f3faf5;
      --cream: #fbf7ed;
      --text: #1d261f;
      --muted: #5f6f65;
      --white: #ffffff;
      --shadow: 0 18px 45px rgba(11, 47, 35, 0.16);
      --shadow-soft: 0 12px 30px rgba(11, 47, 35, 0.10);
      --radius-large: 32px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.7;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 0%, rgba(119, 184, 146, 0.22), transparent 32%),
        radial-gradient(circle at 90% 30%, rgba(220, 238, 227, 0.55), transparent 34%),
        linear-gradient(180deg, var(--cream), var(--green-pale));
      overflow-x: hidden;
      transition: background 0.25s ease, color 0.25s ease;
    }

    body.dark-mode {
      --green-deep: #03100c;
      --green-dark: #dceee3;
      --green-main: #77b892;
      --green-light: #9fd3b1;
      --green-soft: #193f2e;
      --green-pale: #0b1f17;
      --cream: #07130f;
      --text: #edf8f0;
      --muted: #b8cabc;
      --white: #10251c;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.38);
      --shadow-soft: 0 12px 30px rgba(0, 0, 0, 0.22);
      background:
        radial-gradient(circle at 10% 0%, rgba(119, 184, 146, 0.16), transparent 32%),
        radial-gradient(circle at 90% 30%, rgba(31, 111, 80, 0.18), transparent 34%),
        linear-gradient(180deg, #07130f, #0b1f17);
    }

    a {
      color: var(--green-main);
      text-decoration: none;
      font-weight: 700;
    }

    a:hover { text-decoration: underline; }

    .skip-link {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 2000;
      transform: translateY(-140%);
      padding: 10px 14px;
      border-radius: 999px;
      background: #ffffff;
      color: #0b2f23;
      font-weight: 900;
      box-shadow: var(--shadow-soft);
      transition: transform 0.2s ease;
    }

    .skip-link:focus {
      transform: translateY(0);
      outline: 3px solid #ffffff;
      outline-offset: 3px;
    }

    .top-controls {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 1000;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .control-group {
      display: flex;
      gap: 6px;
      padding: 6px;
      border-radius: 999px;
      background: rgba(251, 247, 237, 0.96);
      border: 1px solid rgba(11, 47, 35, 0.14);
      box-shadow: 0 10px 30px rgba(11, 47, 35, 0.18);
      backdrop-filter: blur(10px);
    }

    body.dark-mode .control-group {
      background: rgba(7, 19, 15, 0.92);
      border-color: rgba(220, 238, 227, 0.18);
    }

    .control-group button {
      border: 0;
      padding: 8px 12px;
      border-radius: 999px;
      background: transparent;
      color: #0b2f23;
      font-weight: 850;
      cursor: pointer;
      white-space: nowrap;
    }

    body.dark-mode .control-group button { color: #dceee3; }

    .control-group button.active {
      background: var(--green-main);
      color: #ffffff;
    }

    .print-switch {
      opacity: 0.78;
      box-shadow: 0 8px 22px rgba(11, 47, 35, 0.12);
    }

    .print-switch:hover { opacity: 1; }

    .print-switch button {
      padding: 7px 10px;
      font-size: 0.8rem;
    }

    .accessibility-panel {
      position: fixed;
      top: 78px;
      right: 18px;
      z-index: 1100;
      width: min(360px, calc(100vw - 36px));
      padding: 18px;
      border-radius: 24px;
      background: rgba(251, 247, 237, 0.98);
      border: 1px solid rgba(11, 47, 35, 0.16);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    body.dark-mode .accessibility-panel {
      background: rgba(7, 19, 15, 0.98);
      border-color: rgba(220, 238, 227, 0.18);
    }

    .accessibility-panel[hidden] { display: none; }

    .accessibility-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .accessibility-header h2 {
      font-size: 1.2rem;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    .accessibility-close {
      border: 0;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green-dark);
      font-weight: 900;
      cursor: pointer;
    }

    .accessibility-intro {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .accessibility-options {
      display: grid;
      gap: 10px;
    }

    .accessibility-option {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: start;
      padding: 12px;
      border-radius: 16px;
      background: var(--green-pale);
      border: 1px solid rgba(11, 47, 35, 0.10);
      cursor: pointer;
    }

    body.dark-mode .accessibility-option {
      background: rgba(119, 184, 146, 0.10);
      border-color: rgba(220, 238, 227, 0.12);
    }

    .accessibility-option input {
      width: 20px;
      height: 20px;
      accent-color: var(--green-main);
      margin-top: 2px;
    }

    .accessibility-option strong {
      color: var(--green-dark);
      display: block;
      font-size: 0.95rem;
    }

    .accessibility-option small {
      color: var(--muted);
      display: block;
      line-height: 1.35;
      margin-top: 2px;
    }

    header {
      min-height: 88vh;
      display: grid;
      place-items: center;
      padding: 82px 8% 76px;
      color: #ffffff;
      background:
        radial-gradient(circle at top right, rgba(220, 238, 227, 0.28), transparent 30%),
        radial-gradient(circle at bottom left, rgba(119, 184, 146, 0.22), transparent 34%),
        linear-gradient(135deg, #061f17, #0b2f23 46%, #1f6f50);
      position: relative;
      overflow: hidden;
    }

    header::after {
      content: "";
      position: absolute;
      width: 420px;
      height: 420px;
      right: -160px;
      bottom: -160px;
      border-radius: 50%;
      background: rgba(220, 238, 227, 0.12);
      filter: blur(8px);
    }

    .hero {
      width: 100%;
      max-width: var(--page-width);
      display: grid;
      grid-template-columns: minmax(0, 1.18fr) minmax(280px, 0.82fr);
      gap: 54px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .label {
      display: inline-block;
      padding: 8px 14px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      color: #dceee3;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 22px 0 14px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.5rem, 7vw, 5.3rem);
      line-height: 0.98;
      letter-spacing: -0.045em;
      max-width: 850px;
    }

    .subtitle {
      margin: 0 0 18px;
      color: #dceee3;
      font-size: clamp(1.05rem, 2vw, 1.35rem);
      font-weight: 700;
      max-width: 760px;
    }

    .hero p {
      max-width: 760px;
      font-size: 1.12rem;
      color: rgba(255, 255, 255, 0.86);
    }

    .portrait-card {
      padding: 18px;
      border-radius: var(--radius-large);
      background: rgba(255, 255, 255, 0.13);
      border: 1px solid rgba(255, 255, 255, 0.24);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      transform: rotate(1.2deg);
    }

    .portrait-link { display: block; }

    .profile-photo {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      display: block;
      border-radius: 24px;
      border: 6px solid #dceee3;
      background: #dceee3;
    }

    .photo-note {
      margin-top: 12px;
      font-size: 0.92rem;
      color: rgba(255, 255, 255, 0.82);
      text-align: center;
      font-weight: 750;
    }

    .portrait-actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .portrait-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 999px;
      background: #dceee3;
      color: #0b2f23;
      font-size: 0.88rem;
      font-weight: 900;
      border: 1px solid rgba(255, 255, 255, 0.36);
      transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
    }

    .portrait-button:hover {
      text-decoration: none;
      transform: translateY(-2px);
      background: #ffffff;
      color: #0b2f23;
    }

    .portrait-button.secondary {
      background: rgba(255, 255, 255, 0.14);
      color: #ffffff;
    }

    .portrait-button.secondary:hover {
      background: rgba(255, 255, 255, 0.24);
      color: #ffffff;
    }

    nav.site-nav {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 10px 6%;
      background: rgba(251, 247, 237, 0.94);
      border-bottom: 1px solid rgba(11, 47, 35, 0.12);
      backdrop-filter: blur(10px);
    }

    body.dark-mode nav.site-nav {
      background: rgba(7, 19, 15, 0.94);
      border-bottom-color: rgba(220, 238, 227, 0.12);
    }

    .nav-inner {
      max-width: var(--page-width);
      margin: auto;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
    }

    .nav-toggle {
      display: none;
      border: 1px solid rgba(11, 47, 35, 0.18);
      border-radius: 999px;
      padding: 9px 14px;
      background: var(--white);
      color: var(--green-dark);
      font-weight: 800;
      cursor: pointer;
    }

    .nav-links {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px 18px;
    }

    nav.site-nav a {
      color: var(--green-dark);
      font-size: 0.93rem;
      padding: 6px 10px;
      border-radius: 999px;
      transition: background 0.2s ease, color 0.2s ease;
    }

    nav.site-nav a.active {
      background: var(--green-soft);
      color: var(--green-dark);
    }

    body.dark-mode nav.site-nav a.active {
      background: rgba(119, 184, 146, 0.22);
      color: #dceee3;
    }

    .side-progress {
      position: fixed;
      right: 18px;
      top: 50%;
      z-index: 900;
      transform: translateY(-50%);
      display: grid;
      gap: 6px;
      max-height: calc(100vh - 180px);
      overflow-y: auto;
      padding: 10px;
      border-radius: 22px;
      background: rgba(251, 247, 237, 0.92);
      border: 1px solid rgba(11, 47, 35, 0.12);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(10px);
      scrollbar-width: thin;
    }

    body.dark-mode .side-progress {
      background: rgba(7, 19, 15, 0.88);
      border-color: rgba(220, 238, 227, 0.14);
    }

    .side-progress a {
      display: grid;
      grid-template-columns: 30px 1fr;
      align-items: center;
      gap: 8px;
      min-width: 170px;
      padding: 7px 10px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      line-height: 1.2;
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    .side-progress a:hover {
      text-decoration: none;
      transform: translateX(-2px);
      background: rgba(119, 184, 146, 0.12);
      color: var(--green-dark);
    }

    .side-progress a span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      background: var(--green-pale);
      color: var(--green-main);
      font-size: 0.72rem;
      font-weight: 900;
    }

    .side-progress a.active {
      background: var(--green-main);
      color: #ffffff;
    }

    .side-progress a.active span {
      background: #ffffff;
      color: var(--green-main);
    }

    body.dark-mode .side-progress a.active span {
      background: #dceee3;
      color: #0b2f23;
    }

    .portfolio-search {
      max-width: var(--page-width);
      margin: 18px auto 0;
      padding: 0 6%;
    }

    .search-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border-radius: 999px;
      background: rgba(251, 247, 237, 0.92);
      border: 1px solid rgba(11, 47, 35, 0.12);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(10px);
    }

    body.dark-mode .search-card {
      background: rgba(7, 19, 15, 0.88);
      border-color: rgba(220, 238, 227, 0.14);
    }

    .search-card input {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-weight: 750;
      outline: none;
      padding: 8px 12px;
    }

    .search-card input::placeholder { color: var(--muted); }

    .search-card button {
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      background: var(--green-soft);
      color: var(--green-dark);
      font-weight: 900;
      cursor: pointer;
    }

    .search-result {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 0 12px 4px;
    }

    .search-hidden { display: none !important; }

    main {
      max-width: var(--page-width);
      margin: auto;
      padding: 76px 6% 92px;
    }

    section {
      margin-bottom: 82px;
      scroll-margin-top: 90px;
    }

    .section-title {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 26px;
      align-items: start;
      margin-bottom: 26px;
    }

    .section-title span {
      color: var(--green-main);
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.82rem;
      padding-top: 8px;
    }

    h2 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--green-dark);
      font-size: clamp(1.8rem, 3vw, 3rem);
      line-height: 1.08;
      letter-spacing: -0.025em;
    }

    h3 {
      color: var(--green-dark);
      margin-top: 0;
    }

    .lead {
      max-width: 900px;
      font-size: 1.1rem;
      color: var(--muted);
    }

    .highlight {
      padding: 36px;
      border-radius: 30px;
      color: #ffffff;
      background:
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.14), transparent 28%),
        linear-gradient(135deg, #0b2f23, #1f6f50);
      box-shadow: var(--shadow);
      margin-bottom: 28px;
    }

    .highlight h3 {
      color: #ffffff;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.8rem, 3vw, 2.8rem);
      line-height: 1.08;
    }

    .highlight p { color: rgba(255, 255, 255, 0.88); }

    .thesis-toc {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin: 20px 0 34px;
      padding: 14px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(11, 47, 35, 0.10);
      box-shadow: var(--shadow-soft);
    }

    body.dark-mode .thesis-toc {
      background: rgba(16, 37, 28, 0.78);
      border-color: rgba(220, 238, 227, 0.12);
    }

    .thesis-toc strong {
      color: var(--green-dark);
      margin-right: 4px;
    }

    .thesis-toc a {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--green-pale);
      color: var(--green-dark);
      font-size: 0.88rem;
      font-weight: 900;
    }

    .thesis-toc a:hover {
      text-decoration: none;
      background: var(--green-main);
      color: #ffffff;
    }

    .subsection-heading {
      margin: 36px 0 10px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.5rem, 2.5vw, 2.2rem);
      color: var(--green-dark);
    }

    .team-card,
    .supervision-card,
    .axis-card,
    .project-card,
    .training-card,
    .training-summary,
    .training-master,
    .publication-list li,
    .contact-box {
      box-shadow: var(--shadow-soft);
      min-width: 0;
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        border-color 0.2s ease,
        background 0.2s ease;
    }

    .team-card,
    .supervision-card,
    .axis-card,
    .training-summary,
    .training-master {
      padding: 32px;
      border-radius: 28px;
      background:
        radial-gradient(circle at top right, rgba(119, 184, 146, 0.20), transparent 34%),
        rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(11, 47, 35, 0.10);
    }

    body.dark-mode .team-card,
    body.dark-mode .supervision-card,
    body.dark-mode .axis-card,
    body.dark-mode .training-summary,
    body.dark-mode .training-master {
      background:
        radial-gradient(circle at top right, rgba(119, 184, 146, 0.16), transparent 34%),
        rgba(16, 37, 28, 0.88);
      border-color: rgba(220, 238, 227, 0.12);
    }

    .team-card:hover,
    .supervision-card:hover,
    .axis-card:hover,
    .project-card:hover,
    .training-card:hover,
    .training-summary:hover,
    .training-master:hover,
    .publication-list li:hover,
    .contact-box:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    body:not(.dark-mode) .team-card:hover,
    body:not(.dark-mode) .supervision-card:hover,
    body:not(.dark-mode) .axis-card:hover,
    body:not(.dark-mode) .project-card:hover,
    body:not(.dark-mode) .training-card:hover,
    body:not(.dark-mode) .training-summary:hover,
    body:not(.dark-mode) .training-master:hover,
    body:not(.dark-mode) .publication-list li:hover,
    body:not(.dark-mode) .contact-box:hover {
      border-color: var(--green-main);
    }

    body.dark-mode .team-card:hover,
    body.dark-mode .supervision-card:hover,
    body.dark-mode .axis-card:hover,
    body.dark-mode .project-card:hover,
    body.dark-mode .training-card:hover,
    body.dark-mode .training-summary:hover,
    body.dark-mode .training-master:hover,
    body.dark-mode .publication-list li:hover,
    body.dark-mode .contact-box:hover {
      border-color: #fbf7ed;
    }

    .team-card p,
    .supervision-card p,
    .axis-card p,
    .project-card p,
    .training-card p,
    .training-summary p,
    .training-master p {
      color: var(--muted);
      margin-bottom: 0;
    }

    .team-kicker,
    .supervision-kicker,
    .axis-kicker,
    .training-kicker,
    .publication-type {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green-dark);
      font-size: 0.82rem;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 16px;
    }

    body.dark-mode .team-kicker,
    body.dark-mode .supervision-kicker,
    body.dark-mode .axis-kicker,
    body.dark-mode .training-kicker,
    body.dark-mode .publication-type {
      background: rgba(119, 184, 146, 0.18);
      color: #dceee3;
    }

    .team-actions {
      display: flex;

    .project-link {
      display: inline-flex;

    .training-master {

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")

        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");

    function normalizeSearchText(text) {
      return text

        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")

      return normalizeSearchText(text)

      metaKeywords.setAttribute("content", data.keywords);
      ogTitle.setAttribute("content", data.title);
      ogDescription.setAttribute("content", data.description);
      ogLocale.setAttribute("content", data.locale);
      twitterTitle.setAttribute("content", data.title);
      twitterDescription.setAttribute("content", data.description);
    }

    function updateThemeToggleLabel() {
      const data = DATA[currentLanguage];
      const isDark = document.body.classList.contains("dark-mode");
      themeToggle.textContent = isDark ? data.themeLight : data.themeDark;
    }

    function updateShareButtonLabel(labelType = "default") {
      const data = DATA[currentLanguage];

      if (labelType === "copied") {
        shareButton.textContent = data.copiedLabel;
        shareButton.classList.add("active");
      } else {
        shareButton.textContent = data.shareLabel;
        shareButton.classList.remove("active");
      }
    }

    function updateLanguageButtons() {
      languageButtons.forEach((button) => {
        const isActive = button.dataset.switchLang === currentLanguage;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });
    }

    function revealVisibleElements() {
      document.querySelectorAll(".reveal").forEach((element) => {
        const rect = element.getBoundingClientRect();
        if (rect.top < window.innerHeight - 80) {
          element.classList.add("is-visible");
        }
      });
    }

    function updateActiveNavigation(sectionKey) {
      currentSectionKey = sectionKey || currentSectionKey;

      document.querySelectorAll("nav.site-nav a, .side-progress a").forEach((link) => {
        link.classList.toggle("active", link.dataset.sectionKey === currentSectionKey);
      });
    }

    function detectCurrentSection() {
      if (window.scrollY < 260) {
        updateActiveNavigation("top");
        return;
      }

      const visibleSections = document.querySelectorAll("[data-section]");
      let bestSection = null;
      let bestDistance = Infinity;

      visibleSections.forEach((section) => {
        const rect = section.getBoundingClientRect();
        const distance = Math.abs(rect.top - 120);

        if (rect.top < window.innerHeight * 0.65 && distance < bestDistance) {
          bestSection = section;
          bestDistance = distance;
        }
      });

      if (bestSection) {
        updateActiveNavigation(bestSection.dataset.section);
      }
    }

    function getItemCategories(item) {
      return (item.dataset.category || "")
        .split(/\s+/)
        .map((category) => category.trim())
        .filter(Boolean);
    }

    function updateFilterGroups(sectionElement) {
      sectionElement.querySelectorAll("[data-filter-group]").forEach((group) => {
        const groupItems = Array.from(group.querySelectorAll(".filter-item"));
        const hasVisibleItem = groupItems.some((item) => !item.classList.contains("hidden-by-filter"));
        group.classList.toggle("hidden-by-filter", groupItems.length > 0 && !hasVisibleItem);
      });
    }

    function applyFilter(sectionElement, filterValue) {
      sectionElement.querySelectorAll(".filter-button").forEach((button) => {
        button.classList.toggle("active", button.dataset.filter === filterValue);
      });

      sectionElement.querySelectorAll(".filter-item").forEach((item) => {
        const itemCategories = getItemCategories(item);
        const shouldShow = filterValue === "all" || itemCategories.includes(filterValue);
        item.classList.toggle("hidden-by-filter", !shouldShow);
      });

      updateFilterGroups(sectionElement);
    }

    function updateFilterCounts(sectionElement) {
      const countableItems = Array.from(sectionElement.querySelectorAll(".filter-item"))
        .filter((item) => item.dataset.countable !== "false");

      sectionElement.querySelectorAll(".filter-button").forEach((button) => {
        const filterValue = button.dataset.filter;
        const label = button.dataset.label || button.textContent.replace(/\s\(\d+\)$/u, "");

        const count = filterValue === "all"
          ? countableItems.length
          : countableItems.filter((item) => getItemCategories(item).includes(filterValue)).length;

        button.textContent = `${label} (${count})`;
      });
    }

    function updateAllFilterCounts() {
      document.querySelectorAll("section").forEach((sectionElement) => {
        if (sectionElement.querySelector(".filter-button")) {
          updateFilterCounts(sectionElement);
        }
      });
    }

    function applySiteSearch(rawQuery) {
      const data = DATA[currentLanguage];
      const query = normalizeSearchText(rawQuery);
      const resultBox = document.querySelector("[data-search-result]");
      const searchableItems = document.querySelectorAll(
        ".team-card, .supervision-card, .project-card, .training-summary, .training-card, .publication-list li, .contact-item"
      );

      if (query.length < 2) {
        searchableItems.forEach((item) => item.classList.remove("search-hidden"));
        if (resultBox) {
          resultBox.hidden = true;
          resultBox.textContent = "";
        }
        return;
      }

      let visibleCount = 0;

      searchableItems.forEach((item) => {
        const itemText = normalizeSearchText(item.innerText);
        const isMatch = itemText.includes(query);
        item.classList.toggle("search-hidden", !isMatch);
        if (isMatch) visibleCount += 1;
      });

      if (resultBox) {
        const word = visibleCount > 1 ? data.resultWord[1] : data.resultWord[0];
        resultBox.hidden = false;
        resultBox.textContent = `${visibleCount} ${word}`;
      }
    }

    function clearSiteSearch() {
      const input = document.querySelector("[data-site-search]");
      if (input) input.value = "";

      document.querySelectorAll(".search-hidden").forEach((item) => {
        item.classList.remove("search-hidden");
      });

      const resultBox = document.querySelector("[data-search-result]");
      if (resultBox) {
        resultBox.hidden = true;
        resultBox.textContent = "";
      }
    }

    function updateDisabledProjectTooltips() {
      const text = DATA[currentLanguage].unavailable;

      document.querySelectorAll(".project-link.disabled").forEach((link) => {
        link.dataset.tooltip = text;
        link.setAttribute("aria-disabled", "true");
        link.setAttribute("title", text);
      });
    }

    function openOrCloseAxisProjects(button) {
      const targetAxis = document.getElementById(button.dataset.axisTarget);
      if (!targetAxis) return;

      targetAxis.querySelectorAll(".project-card").forEach((project) => {
        project.open = button.dataset.axisAction === "open";
      });
    }

    function closeMobileNavigation() {
      document.querySelectorAll("nav.site-nav.open").forEach((nav) => nav.classList.remove("open"));
    }

    async function copyTextToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }

      const textArea = document.createElement("textarea");
      textArea.value = text;
      textArea.setAttribute("readonly", "");
      textArea.style.position = "fixed";
      textArea.style.top = "-9999px";
      document.body.appendChild(textArea);
      textArea.select();
      document.execCommand("copy");
      document.body.removeChild(textArea);
    }

    async function sharePortfolio() {
      const data = DATA[currentLanguage];
      const shareUrl = window.location.href.split("#")[0];

      const shareData = {
        title: data.title,
        text: data.description,
        url: shareUrl
      };

      try {
        if (navigator.share) {
          await navigator.share(shareData);
        } else {
          await copyTextToClipboard(shareUrl);
          updateShareButtonLabel("copied");
          window.clearTimeout(shareTimeout);
          shareTimeout = window.setTimeout(updateShareButtonLabel, 1800);
        }
      } catch (error) {
        if (error.name !== "AbortError") {
          await copyTextToClipboard(shareUrl);
          updateShareButtonLabel("copied");
          window.clearTimeout(shareTimeout);
          shareTimeout = window.setTimeout(updateShareButtonLabel, 1800);
        }
      }
    }

    function preparePrintView() {
      const detailsElements = document.querySelectorAll("details");
      const previouslyClosed = [];

      detailsElements.forEach((details) => {
        if (!details.open) {
          details.open = true;
          previouslyClosed.push(details);
        }
      });

      window.print();

      window.setTimeout(() => {
        previouslyClosed.forEach((details) => {
          details.open = false;
        });
      }, 1000);
    }

    function loadAccessibilitySettings() {
      try {
        return JSON.parse(localStorage.getItem("portfolio-accessibility")) || {};
      } catch {
        return {};
      }
    }

    function applyAccessibilitySettings(settings, save = true) {
      Object.entries(accessibilityClasses).forEach(([key, className]) => {
        const isActive = Boolean(settings[key]);
        document.body.classList.toggle(className, isActive);

        const control = document.querySelector(`[data-accessibility-option="${key}"]`);
        if (control) {
          control.checked = isActive;
        }
      });

      const hasActiveSetting = Object.keys(accessibilityClasses).some((key) => Boolean(settings[key]));
      accessibilityToggle.classList.toggle("active", hasActiveSetting);

      if (save) {
        localStorage.setItem("portfolio-accessibility", JSON.stringify(settings));
      }
    }

    function setTheme(theme) {
      const isDark = theme === "dark";
      document.body.classList.toggle("dark-mode", isDark);
      themeToggle.classList.toggle("active", isDark);
      localStorage.setItem("portfolio-theme", theme);
      updateThemeToggleLabel();
    }

    function updateHash(sectionKey, mode = "replace") {
      if (!sectionKey || sectionKey === "top") return;

      const hash = `#${sectionId(sectionKey)}`;
      if (window.location.hash === hash) return;

      const newUrl = `${window.location.pathname}${window.location.search}${hash}`;
      window.history[mode === "push" ? "pushState" : "replaceState"](null, "", newUrl);
    }

    function getInitialStateFromHash() {
      const hashId = window.location.hash.replace("#", "");
      if (!hashId) return null;

      const parts = hashId.split("-");
      const language = parts[0] === "en" ? "en" : parts[0] === "fr" ? "fr" : null;
      const sectionKey = parts.slice(1).join("-");

      if (!language) return null;

      const sectionMap = {
        about: "about",
        team: "team",
        equipe: "team",
        thesis: "thesis",
        these: "thesis",
        side: "side",
        training: "training",
        formations: "training",
        publications: "publications",
        communications: "communications",
        contact: "contact"
      };

      return { language, sectionKey: sectionMap[sectionKey] || "top" };
    }

    function setLanguage(language, preserveSection = true, syncHash = true) {
      currentLanguage = language;
      const data = DATA[currentLanguage];

      updateMetadata(data);
      updateStaticI18n(data);
      updateThemeToggleLabel();
      updateShareButtonLabel();
      updateLanguageButtons();
      localStorage.setItem("portfolio-language", currentLanguage);
      render(data);
      updateAllFilterCounts();
      updateDisabledProjectTooltips();
      applyAccessibilitySettings(loadAccessibilitySettings(), false);

      if (preserveSection && currentSectionKey !== "top") {
        const target = document.getElementById(sectionId(currentSectionKey));
        if (target) {
          window.setTimeout(() => target.scrollIntoView({ behavior: "smooth", block: "start" }), 50);
        }
      }

      if (syncHash) {
        updateHash(currentSectionKey);
      }

      window.setTimeout(() => {
        revealVisibleElements();
        detectCurrentSection();
      }, 80);
    }

    function updateDynamicBindings() {
      document.querySelector("[data-nav-toggle]")?.addEventListener("click", () => {
        document.querySelector("nav.site-nav")?.classList.toggle("open");
      });

      document.querySelectorAll("nav.site-nav a, .side-progress a").forEach((link) => {
        link.addEventListener("click", () => {
          currentSectionKey = link.dataset.sectionKey;
          updateActiveNavigation(currentSectionKey);
          closeMobileNavigation();
        });
      });

      document.querySelectorAll(".filter-button").forEach((button) => {
        button.addEventListener("click", () => {
          applyFilter(button.closest("section"), button.dataset.filter);
        });
      });

      document.querySelectorAll("[data-copy-email]").forEach((button) => {
        button.addEventListener("click", async () => {
          await copyTextToClipboard(button.dataset.copyEmail);
          button.textContent = button.dataset.copiedLabel;
          button.classList.add("active");

          window.setTimeout(() => {
            button.textContent = button.dataset.defaultLabel;
            button.classList.remove("active");
          }, 1600);
        });
      });

      document.querySelector("[data-site-search]")?.addEventListener("input", (event) => {
        applySiteSearch(event.target.value);
      });

      document.querySelector("[data-search-clear]")?.addEventListener("click", clearSiteSearch);

      document.querySelectorAll("[data-cite-button]").forEach((button) => {
        button.addEventListener("click", async () => {
          await copyTextToClipboard(button.dataset.citation);
          button.textContent = button.dataset.copiedLabel;
          button.classList.add("active");

          window.setTimeout(() => {
            button.textContent = button.dataset.defaultLabel;
            button.classList.remove("active");
          }, 1800);
        });
      });

      document.querySelectorAll("[data-axis-action]").forEach((button) => {
        button.addEventListener("click", () => openOrCloseAxisProjects(button));
      });

      document.querySelectorAll(".project-link.disabled").forEach((link) => {
        link.addEventListener("click", (event) => event.preventDefault());
      });

      updateDisabledProjectTooltips();
      revealVisibleElements();
      updateActiveNavigation(currentSectionKey);
    }

    languageButtons.forEach((button) => {
      button.addEventListener("click", () => setLanguage(button.dataset.switchLang, true, true));
    });

    accessibilityToggle.addEventListener("click", () => {
      const isHidden = accessibilityPanel.hidden;
      accessibilityPanel.hidden = !isHidden;
      accessibilityToggle.setAttribute("aria-expanded", String(isHidden));
    });

    accessibilityClose.addEventListener("click", () => {
      accessibilityPanel.hidden = true;
      accessibilityToggle.setAttribute("aria-expanded", "false");
      accessibilityToggle.focus();
    });

    accessibilityControls.forEach((control) => {
      control.addEventListener("change", () => {
        const settings = loadAccessibilitySettings();
        settings[control.dataset.accessibilityOption] = control.checked;
        applyAccessibilitySettings(settings);
      });
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !accessibilityPanel.hidden) {
        accessibilityPanel.hidden = true;
        accessibilityToggle.setAttribute("aria-expanded", "false");
      }
    });

    themeToggle.addEventListener("click", () => {
      const newTheme = document.body.classList.contains("dark-mode") ? "light" : "dark";
      setTheme(newTheme);
    });

    shareButton.addEventListener("click", sharePortfolio);

    document.querySelectorAll("[data-print-button], [data-pdf-button]").forEach((button) => {
      button.addEventListener("click", preparePrintView);
    });

    backToTopButton.addEventListener("click", () => {
      currentSectionKey = "top";
      updateActiveNavigation("top");
      document.getElementById(`${currentLanguage}-top`)?.scrollIntoView({ behavior: "smooth", block: "start" });
    });

    window.addEventListener("scroll", () => {
      revealVisibleElements();
      detectCurrentSection();
      backToTopButton.classList.toggle("visible", window.scrollY > 500);
    });

    window.addEventListener("resize", revealVisibleElements);

    window.addEventListener("load", () => {
      revealVisibleElements();
      detectCurrentSection();
      updateAllFilterCounts();
      updateDisabledProjectTooltips();
    });

    const initialHashState = getInitialStateFromHash();
    const savedTheme = localStorage.getItem("portfolio-theme");
    const savedLanguage = localStorage.getItem("portfolio-language");
    const initialLanguage = initialHashState?.language || (savedLanguage === "en" ? "en" : "fr");

    currentLanguage = initialLanguage;
    currentSectionKey = initialHashState?.sectionKey || "top";

    setTheme(savedTheme === "dark" ? "dark" : "light");
    setLanguage(initialLanguage, false, false);
    applyAccessibilitySettings(loadAccessibilitySettings(), false);

    if (initialHashState?.sectionKey && initialHashState.sectionKey !== "top") {
      window.setTimeout(() => {
        document.getElementById(sectionId(initialHashState.sectionKey))?.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 100);
    }
  </script>
</body>
</html>
